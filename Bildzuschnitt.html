<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildzuschnitt-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [croppedImages, setCroppedImages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const fileInputRef = useRef(null);

            const getFormattedFileName = (originalName, format) => {
                const name = originalName.split('.')[0];
                return `${name}_${format}.jpg`;
            };

            const handleFileChange = (event) => {
                const files = Array.from(event.target.files).filter(file =>
                    file.type === 'image/jpeg' || file.type === 'image/png'
                );
                setSelectedFiles(prevFiles => [...prevFiles, ...files]);
            };

            const handleUploadClick = () => fileInputRef.current.click();

            const removeFile = (indexToRemove) => {
                setSelectedFiles(prevFiles => prevFiles.filter((_, index) => index !== indexToRemove));
                setCroppedImages([]);
            };

            const processInitialWidth = (image, maxWidth) => {
                return new Promise((resolve, reject) => {
                    const originalWidth = image.naturalWidth;
                    const originalHeight = image.naturalHeight;
                    if (originalWidth <= maxWidth) return resolve(image);

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = maxWidth;
                    canvas.height = originalHeight;
                    const startX = (originalWidth - maxWidth) / 2;
                    ctx.drawImage(image, startX, 0, maxWidth, originalHeight, 0, 0, maxWidth, originalHeight);

                    const processedImg = new Image();
                    processedImg.onload = () => resolve(processedImg);
                    processedImg.src = canvas.toDataURL('image/jpeg', 0.9);
                });
            };

            const cropImage = (image, targetAspectRatio) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const currentWidth = image.naturalWidth;
                    const currentHeight = image.naturalHeight;

                    let cropWidth = currentWidth;
                    let cropHeight = currentWidth / targetAspectRatio;
                    let startX = 0, startY = 0;

                    if (cropHeight > currentHeight) {
                        cropHeight = currentHeight;
                        cropWidth = currentHeight * targetAspectRatio;
                        startX = (currentWidth - cropWidth) / 2;
                    } else {
                        startY = (currentHeight - cropHeight) / 2;
                    }

                    canvas.width = cropWidth;
                    canvas.height = cropHeight;
                    ctx.drawImage(image, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                    resolve(canvas.toDataURL('image/jpeg', 0.9));
                });
            };

            const processImages = async () => {
                setIsLoading(true);
                setCroppedImages([]);
                const processed = [];
                for (const file of selectedFiles) {
                    let imageUrl = null;
                    try {
                        imageUrl = URL.createObjectURL(file);
                        const img = new Image();
                        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = imageUrl; });

                        const initialProcessedImg = await processInitialWidth(img, 1080);
                        const cropped9x16 = await cropImage(initialProcessedImg, 9 / 16);
                        const cropped4x5 = await cropImage(initialProcessedImg, 4 / 5);
                        const cropped1x1 = await cropImage(initialProcessedImg, 1 / 1);

                        processed.push({
                            originalFileName: file.name,
                            dataUrl9x16: cropped9x16,
                            dataUrl4x5: cropped4x5,
                            dataUrl1x1: cropped1x1
                        });
                    } catch (e) {
                        processed.push({ originalFileName: file.name, error: "Fehler beim Verarbeiten." });
                    } finally {
                        if (imageUrl) URL.revokeObjectURL(imageUrl);
                    }
                }
                setCroppedImages(processed);
                setIsLoading(false);
            };

            const downloadImage = (dataUrl, fileName) => {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = fileName;
                link.click();
            };

            const downloadAllImages = async () => {
                const zip = new JSZip();
                croppedImages.forEach(item => {
                    if (item.dataUrl9x16) zip.file(getFormattedFileName(item.originalFileName, '9x16'), item.dataUrl9x16.split(',')[1], { base64: true });
                    if (item.dataUrl4x5) zip.file(getFormattedFileName(item.originalFileName, '4x5'), item.dataUrl4x5.split(',')[1], { base64: true });
                    if (item.dataUrl1x1) zip.file(getFormattedFileName(item.originalFileName, '1x1'), item.dataUrl1x1.split(',')[1], { base64: true });
                });
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "zugeschnittene_bilder.zip";
                link.click();
            };

            return (
                <div className="p-4 flex flex-col items-center">
                    <header className="w-full max-w-4xl text-center mb-8">
                        <h1 className="text-4xl font-bold text-indigo-700 mb-2 p-2 bg-white rounded-lg shadow-md">Bildzuschnitt-App</h1>
                        <p className="text-gray-600">9:16, 4:5 und 1:1 Formate (max. 1080px Breite)</p>
                    </header>

                    <main className="w-full max-w-4xl bg-white p-8 rounded-xl shadow-lg">
                        <div className="flex flex-col items-center mb-6">
                            <input type="file" multiple accept="image/*" onChange={handleFileChange} className="hidden" ref={fileInputRef} />
                            <button onClick={handleUploadClick} className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-full transition transform hover:scale-105">Bilder auswählen</button>
                            {selectedFiles.length > 0 && <p className="mt-4 text-gray-700">{selectedFiles.length} Bild(er) bereit.</p>}
                        </div>

                        {selectedFiles.length > 0 && (
                            <div className="text-center mt-6 border-t pt-6">
                                <button onClick={processImages} disabled={isLoading} className="bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-full disabled:opacity-50">
                                    {isLoading ? 'Verarbeite...' : 'Bilder jetzt zuschneiden'}
                                </button>
                            </div>
                        )}

                        {croppedImages.length > 0 && (
                            <div className="mt-12 flex flex-col gap-8">
                                {croppedImages.map((item, idx) => (
                                    <div key={idx} className="bg-gray-50 p-6 rounded-lg border border-gray-200">
                                        <p className="font-bold text-lg mb-4 text-center">{item.originalFileName}</p>
                                        <div className="flex flex-col sm:flex-row justify-around items-center gap-6">
                                            {['9x16', '4x5', '1x1'].map(fmt => (
                                                <div key={fmt} className="flex flex-col items-center">
                                                    <img src={item[`dataUrl${fmt}`]} className="shadow-md border rounded mb-2 max-h-48" />
                                                    <span className="text-xs text-gray-500 mb-2">{fmt} Format</span>
                                                    <button onClick={() => downloadImage(item[`dataUrl${fmt}`], getFormattedFileName(item.originalFileName, fmt))} className="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full hover:bg-purple-200">Download</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <button onClick={downloadAllImages} className="bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">Alle als ZIP herunterladen</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
