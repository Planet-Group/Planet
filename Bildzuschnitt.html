<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Crop Pro | Individuelle Dateinamen</title>
    <!-- Tailwind CSS für modernes Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM Bibliotheken -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel für die JSX-Verarbeitung im Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- JSZip für die Erstellung des Sammel-Downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .drop-zone { transition: all 0.2s ease-in-out; }
        .drop-zone-active { 
            border-color: #4f46e5; 
            background-color: #eef2ff; 
            transform: scale(1.01); 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.1); 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const App = () => {
            const [selectedFiles, setSelectedFiles] = useState([]);
            const [croppedImages, setCroppedImages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [customBaseName, setCustomBaseName] = useState("");
            const fileInputRef = useRef(null);

            // Hilfsfunktion für die Dateinamen: Nutzt Basisnamen oder Originalnamen
            const getFormattedFileName = (base, format) => {
                return `${base}_${format}.png`;
            };

            const addFiles = (files) => {
                const validFiles = Array.from(files).filter(file =>
                    file.type === 'image/jpeg' || file.type === 'image/png'
                );
                setSelectedFiles(prev => [...prev, ...validFiles]);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    addFiles(e.dataTransfer.files);
                }
            };

            const processInitialWidth = (image, maxWidth) => {
                return new Promise((resolve, reject) => {
                    const originalWidth = image.naturalWidth;
                    const originalHeight = image.naturalHeight;
                    if (originalWidth <= maxWidth) return resolve(image);

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = maxWidth;
                    canvas.height = originalHeight;
                    const startX = (originalWidth - maxWidth) / 2;
                    ctx.drawImage(image, startX, 0, maxWidth, originalHeight, 0, 0, maxWidth, originalHeight);

                    const processedImg = new Image();
                    processedImg.onload = () => resolve(processedImg);
                    processedImg.src = canvas.toDataURL('image/png');
                });
            };

            const cropImage = (image, targetAspectRatio) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const currentWidth = image.naturalWidth;
                    const currentHeight = image.naturalHeight;

                    let cropWidth = currentWidth;
                    let cropHeight = currentWidth / targetAspectRatio;
                    let startX = 0, startY = 0;

                    if (cropHeight > currentHeight) {
                        cropHeight = currentHeight;
                        cropWidth = currentHeight * targetAspectRatio;
                        startX = (currentWidth - cropWidth) / 2;
                    } else {
                        startY = (currentHeight - cropHeight) / 2;
                    }

                    canvas.width = cropWidth;
                    canvas.height = cropHeight;
                    ctx.drawImage(image, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            const processImages = async () => {
                setIsLoading(true);
                setCroppedImages([]);
                const processed = [];

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    let imageUrl = null;
                    
                    // Namens-Logik
                    let baseNameForThisFile = "";
                    if (customBaseName.trim() !== "") {
                        baseNameForThisFile = selectedFiles.length > 1 
                            ? `${customBaseName.trim()}_${i + 1}` 
                            : customBaseName.trim();
                    } else {
                        baseNameForThisFile = file.name.split('.')[0];
                    }

                    try {
                        imageUrl = URL.createObjectURL(file);
                        const img = new Image();
                        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = imageUrl; });

                        const initialProcessedImg = await processInitialWidth(img, 1080);
                        const cropped9x16 = await cropImage(initialProcessedImg, 9 / 16);
                        const cropped4x5 = await cropImage(initialProcessedImg, 4 / 5);
                        const cropped1x1 = await cropImage(initialProcessedImg, 1 / 1);

                        processed.push({
                            targetBaseName: baseNameForThisFile,
                            dataUrl9x16: cropped9x16,
                            dataUrl4x5: cropped4x5,
                            dataUrl1x1: cropped1x1
                        });
                    } catch (e) {
                        console.error(e);
                    } finally {
                        if (imageUrl) URL.revokeObjectURL(imageUrl);
                    }
                }
                setCroppedImages(processed);
                setIsLoading(false);
            };

            const downloadImage = (dataUrl, fileName) => {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = fileName;
                link.click();
            };

            const downloadAllImages = async () => {
                const zip = new window.JSZip();
                croppedImages.forEach(item => {
                    ['9x16', '4x5', '1x1'].forEach(fmt => {
                        const key = `dataUrl${fmt}`;
                        if (item[key]) {
                            const name = getFormattedFileName(item.targetBaseName, fmt);
                            zip.file(name, item[key].split(',')[1], { base64: true });
                        }
                    });
                });
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${customBaseName.trim() || 'social_crops'}.zip`;
                link.click();
            };

            return (
                <div className="max-w-4xl mx-auto py-12 px-4">
                    <header className="text-center mb-12">
                        <h1 className="text-4xl font-extrabold tracking-tight mb-2">Insta-Crop <span className="text-indigo-600">Pro</span></h1>
                        <p className="text-slate-500 font-medium">Verlustfreier Zuschnitt mit individueller Benennung</p>
                    </header>

                    <main className="space-y-8">
                        <div 
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                            onDrop={handleDrop}
                            onClick={() => fileInputRef.current.click()}
                            className={`drop-zone relative border-4 border-dashed rounded-[2.5rem] p-12 flex flex-col items-center justify-center cursor-pointer 
                                ${isDragging ? 'drop-zone-active' : 'border-slate-200 bg-white hover:border-indigo-300'}`}
                        >
                            <input type="file" multiple accept="image/*" onChange={(e) => addFiles(e.target.files)} className="hidden" ref={fileInputRef} />
                            <div className={`w-20 h-20 rounded-3xl flex items-center justify-center mb-6 shadow-sm ${isDragging ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-600'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <h2 className="text-2xl font-bold mb-2">{isDragging ? 'Bilder jetzt loslassen' : 'Bilder hierher ziehen'}</h2>
                            <p className="text-slate-400 text-sm">oder klicken zum Auswählen</p>
                        </div>

                        {selectedFiles.length > 0 && (
                            <section className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-slate-800">{selectedFiles.length} Bilder ausgewählt</h3>
                                    <button onClick={() => setSelectedFiles([])} className="text-sm font-semibold text-red-500 hover:underline">Liste leeren</button>
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 max-h-32 overflow-y-auto pr-2">
                                    {selectedFiles.map((f, i) => (
                                        <div key={i} className="bg-slate-50 p-2 rounded-xl text-[10px] text-slate-500 border border-slate-100 truncate flex items-center justify-between">
                                            <span className="truncate pr-2">{f.name}</span>
                                            <button onClick={(e) => { e.stopPropagation(); setSelectedFiles(prev => prev.filter((_, idx) => idx !== i)); }} className="text-slate-300 hover:text-red-500 font-bold">×</button>
                                        </div>
                                    ))}
                                </div>

                                {/* Feld für benutzerdefinierten Namen */}
                                <div className="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100">
                                    <label className="block text-sm font-bold text-indigo-900 mb-2">Basis-Dateiname (optional)</label>
                                    <input 
                                        type="text" 
                                        value={customBaseName}
                                        onChange={(e) => setCustomBaseName(e.target.value)}
                                        placeholder="z.B. Sommer_Shooting"
                                        className="w-full px-4 py-3 rounded-xl border-2 border-white focus:border-indigo-400 focus:outline-none transition-all shadow-sm"
                                    />
                                    <p className="text-[10px] text-indigo-400 mt-2 italic">Tipp: Wenn du mehrere Bilder hast, werden diese automatisch durchnummeriert.</p>
                                </div>

                                <button 
                                    onClick={processImages} 
                                    disabled={isLoading}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition shadow-xl shadow-indigo-100 disabled:opacity-50"
                                >
                                    {isLoading ? 'VERARBEITUNG LÄUFT...' : 'JETZT VERLUSTFREI ZUSCHNEIDEN'}
                                </button>
                            </section>
                        )}

                        {croppedImages.length > 0 && (
                            <section className="space-y-12">
                                <div className="text-center pt-8">
                                    <h2 className="text-3xl font-extrabold text-slate-900">Deine Ergebnisse</h2>
                                    <p className="text-slate-500 mt-1">Alle Dateien werden als PNG gespeichert.</p>
                                </div>

                                {croppedImages.map((item, idx) => (
                                    <div key={idx} className="bg-white rounded-[3rem] p-10 shadow-xl shadow-slate-200/40 border border-slate-50">
                                        <div className="flex items-center mb-8">
                                            <div className="bg-slate-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center font-extrabold text-lg mr-4">{idx + 1}</div>
                                            <h4 className="text-xl font-bold text-slate-800 truncate">{item.targetBaseName}.png</h4>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                            {['9x16', '4x5', '1x1'].map(fmt => (
                                                <div key={fmt} className="flex flex-col">
                                                    <div className="bg-slate-100 rounded-3xl overflow-hidden mb-4 border border-slate-100 flex items-center justify-center" 
                                                         style={{aspectRatio: fmt === '1x1' ? '1/1' : (fmt === '4x5' ? '4/5' : '9/16'), maxHeight: '450px'}}>
                                                        <img src={item[`dataUrl${fmt}`]} className="w-full h-full object-cover" alt={fmt} />
                                                    </div>
                                                    <div className="flex items-center justify-between px-2">
                                                        <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">{fmt}</span>
                                                        <button 
                                                            onClick={() => downloadImage(item[`dataUrl${fmt}`], getFormattedFileName(item.targetBaseName, fmt))}
                                                            className="text-indigo-600 text-xs font-bold hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition"
                                                        >DOWNLOAD</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}

                                <div className="flex justify-center pb-12 pt-6">
                                    <button 
                                        onClick={downloadAllImages} 
                                        className="bg-slate-900 text-white text-xl font-bold py-6 px-12 rounded-3xl shadow-2xl hover:bg-slate-800 transition transform hover:-translate-y-1 w-full max-w-xl"
                                    >
                                        ALLE BILDER ALS ZIP HERUNTERLADEN
                                    </button>
                                </div>
                            </section>
                        )}
                    </main>
                    <footer className="text-center text-slate-400 text-[10px] pb-10">
                        Dateinamen werden automatisch mit _9x16, _4x5 oder _1x1 ergänzt.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
